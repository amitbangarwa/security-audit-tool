name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          mkdir -p releases
          cd dist && zip -r "../releases/browser-security-audit-v${{ steps.version.outputs.VERSION }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*.zip
          generate_release_notes: true
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Installation

            1. Download **browser-security-audit-v${{ steps.version.outputs.VERSION }}.zip** from the Assets below
            2. Unzip to a permanent folder (do **not** delete it after installing)
            3. Open **chrome://extensions** in Chrome
            4. Enable **Developer Mode** (toggle in the top-right corner)
            5. Click **Load unpacked** and select the unzipped folder
            6. Click the extension icon in the toolbar to run a security audit on any page

            > **Note:** Sideloaded extensions show a Developer Mode warning banner. This is normal for extensions installed outside the Chrome Web Store.

            ---

            ## What's Changed

      # To publish to Chrome Web Store, uncomment and configure repository secrets:
      # CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN
